<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9CAF6E"/>
      <stop offset="100%" style="stop-color:#778B3E"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="0"/>
  <!-- 书本图标 -->
  <g transform="translate(300,140)">
    <!-- 书脊 -->
    <rect x="-8" y="-50" width="16" height="100" rx="2" fill="rgba(255,255,255,0.3)"/>
    <!-- 左页 -->
    <path d="M-8,-50 Q-50,-55 -80,-45 L-80,45 Q-50,35 -8,40 Z" fill="rgba(255,255,255,0.85)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <!-- 右页 -->
    <path d="M8,-50 Q50,-55 80,-45 L80,45 Q50,35 8,40 Z" fill="rgba(255,255,255,0.95)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <!-- 左页文字线 -->
    <line x1="-65" y1="-25" x2="-20" y2="-20" stroke="rgba(119,139,62,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-65" y1="-10" x2="-20" y2="-5" stroke="rgba(119,139,62,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-65" y1="5" x2="-20" y2="10" stroke="rgba(119,139,62,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-65" y1="20" x2="-40" y2="25" stroke="rgba(119,139,62,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 右页文字线 -->
    <line x1="20" y1="-20" x2="65" y2="-25" stroke="rgba(119,139,62,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="-5" x2="65" y2="-10" stroke="rgba(119,139,62,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="10" x2="65" y2="5" stroke="rgba(119,139,62,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="25" x2="40" y2="20" stroke="rgba(119,139,62,0.3)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- 标题 -->
  <text x="300" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="4">菜鸡铁粉</text>
  <text x="300" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="rgba(255,255,255,0.75)" letter-spacing="2">CAIJI FAN</text>
  <!-- 装饰点 -->
  <circle cx="120" cy="340" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="480" cy="340" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="140" cy="60" r="2" fill="rgba(255,255,255,0.2)"/>
  <circle cx="460" cy="60" r="2" fill="rgba(255,255,255,0.2)"/>
</svg>
